name: Publish to npm

# Publishes @flexops/elements to registry.npmjs.org via npm trusted publishing
# (OIDC) — no stored token, no MFA prompt. Triggered on vX.Y.Z tag push or
# manual workflow_dispatch.
#
# One-time setup on npmjs.com (required before the first run):
#   1. Log in to npmjs.com → package @flexops/elements → Settings →
#      Trusted Publishers
#   2. Add a GitHub Actions trusted publisher with:
#        Organization or user: BillEisenman
#        Repository:           flexops-sdk-elements
#        Workflow filename:    publish.yml
#        Environment:          (leave blank)
#
# Docs: https://docs.npmjs.com/trusted-publishers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure npm supports OIDC publishing
        run: npm install -g npm@latest

      - name: Smoke-check package exports resolve
        run: |
          set -e
          cat > "$RUNNER_TEMP/check-exports.mjs" <<'EOF'
          import { readFileSync, existsSync } from 'node:fs';
          import { createRequire } from 'node:module';
          import { resolve } from 'node:path';
          import { pathToFileURL } from 'node:url';
          const map = JSON.parse(readFileSync('./package.json','utf8')).exports['.'];
          const rel = p => p.replace(/^\.\//,'');
          let bad = 0;
          for (const t of new Set(Object.values(map)))
            if (!existsSync(rel(t))) { console.error('::error::exports target missing: ' + t); bad++; }
          if (bad) process.exit(1);
          await import(pathToFileURL(resolve(rel(map.import))).href);
          createRequire(import.meta.url)(resolve(rel(map.require)));
          console.log('exports OK: import=' + map.import + ' require=' + map.require);
          EOF
          node "$RUNNER_TEMP/check-exports.mjs"

      - name: Publish (OIDC trusted publisher)
        run: npm publish --access public --provenance
